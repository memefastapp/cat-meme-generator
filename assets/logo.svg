<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none" aria-label="Cat Meme Generator cat icon" role="img">
  <!-- left ear -->
  <polygon points="4,16 8,4 13,16" fill="currentColor"/>
  <!-- right ear -->
  <polygon points="19,16 24,4 28,16" fill="currentColor"/>
  <!-- head -->
  <circle cx="16" cy="20" r="11" fill="currentColor"/>
  <!-- left eye -->
  <ellipse cx="12" cy="19" rx="2" ry="2.2" fill="white"/>
  <!-- right eye -->
  <ellipse cx="20" cy="19" rx="2" ry="2.2" fill="white"/>
  <!-- pupils -->
  <ellipse cx="12" cy="19.5" rx="0.9" ry="1.4" fill="#1E1A14"/>
  <ellipse cx="20" cy="19.5" rx="0.9" ry="1.4" fill="#1E1A14"/>
  <!-- nose -->
  <polygon points="16,22.5 14.5,24 17.5,24" fill="white"/>
  <!-- mouth -->
  <path d="M13.5 24.5 Q16 26.5 18.5 24.5" stroke="white" stroke-width="1.2" stroke-linecap="round" fill="none"/>
  <!-- whiskers left -->
  <line x1="5" y1="22" x2="11" y2="23" stroke="white" stroke-width="0.8" stroke-linecap="round"/>
  <line x1="5" y1="24.5" x2="11" y2="24.5" stroke="white" stroke-width="0.8" stroke-linecap="round"/>
  <!-- whiskers right -->
  <line x1="27" y1="22" x2="21" y2="23" stroke="white" stroke-width="0.8" stroke-linecap="round"/>
  <line x1="27" y1="24.5" x2="21" y2="24.5" stroke="white" stroke-width="0.8" stroke-linecap="round"/>
</svg>
